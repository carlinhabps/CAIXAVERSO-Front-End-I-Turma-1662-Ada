<header>
  <h1>
    Olá, <span>{{ personName }}</span
    >!
  </h1>

  <img [src]="buttonTheme" alt="Tema" (click)="toggleTheme()" />
</header>
<main>
  <app-summary-cards [income]="incomeTotal" [expenses]="expensesTotal"> </app-summary-cards>

  <app-filter [categoriesList]="categoryListApi" (registerClicked)="onRegisterClick()"></app-filter>

  @if (showNewRegister) {
    <app-new-register (closeRegister)="offRegisterClick()"></app-new-register>
  }

  <app-content [transactionsList]="transactionListApi"> </app-content>

  <router-outlet />
</main>
<footer class="footer">
  <p>2026 | Controle Financeiro</p>
  <p>© Carla Beatriz | CAIXAVERSO | Dev Front-end</p>
  <p>AdaTech | Turma 1662 | Angular I</p>
</footer>
