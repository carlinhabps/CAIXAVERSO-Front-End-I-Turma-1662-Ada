<div class="formulario">
  <mat-form-field class="categoriesOptions">
    <mat-label>Categoria</mat-label>

    <mat-select [formControl]="categoryControl">
      <mat-option value="">-- Selecione --</mat-option>

      @for (type of categoriesList; track type.type) {
        <mat-optgroup [label]="type.type">
          @for (category of type.categories; track category.id) {
            <mat-option [value]="category.name"> {{ category.name }} </mat-option>
          }
        </mat-optgroup>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field class="categoriesOptions">
    <mat-label>Data</mat-label>
    <input
      matInput
      [matDatepicker]="picker"
      [formControl]="dateControl"
      [max]="maxDate"
      placeholder="Selecione a data"
    />
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>

  <div class="inputContainer">
    <input
      class="new-register description"
      type="text"
      placeholder="Descrição"
      [formControl]="descriptionControl"
    />

    <input
      class="new-register value"
      type="text"
      placeholder="Valor"
      [value]="valueText"
      (input)="onValueInput($event)"
    />
  </div>

  <div class="buttonContainer">
    <button (click)="onSave()">Registrar</button>

    <button (click)="offNewRegisterClick()">Fechar</button>
  </div>
</div>
