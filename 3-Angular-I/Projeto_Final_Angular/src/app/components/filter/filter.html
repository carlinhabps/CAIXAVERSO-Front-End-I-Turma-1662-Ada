<div class="filter">
  <form>
    <mat-form-field class="dateFilter">
      <mat-label>Selecione um período</mat-label>
      <mat-date-range-input [rangePicker]="rangePicker">
        <input matStartDate placeholder="Data início" />
        <input matEndDate placeholder="Data Fim" />
      </mat-date-range-input>
      <!-- <mat-hint>dd/mm/aaaa – dd/mm/aaaa</mat-hint> -->
      <mat-datepicker-toggle matIconSuffix [for]="rangePicker"></mat-datepicker-toggle>
      <mat-date-range-picker #rangePicker>
        <mat-date-range-picker-actions>
          <button matButton matDateRangePickerCancel id="cancelButton">Cancelar</button>
          <button matButton="elevated" matDateRangePickerApply id="selectButton">Selecionar</button>
        </mat-date-range-picker-actions>
      </mat-date-range-picker>
    </mat-form-field>

    <div class="filterContainer">
      <!-- <label for="category" name="category">Categoria:</label>
      <select name="category" id="category">
        <option value="default" selected disabled hidden>Selecione a categoria...</option>
        @for () {
        <option value="1">Receita</option>
        }
      </select> -->

      <!-- ! CONTINUAR DAQUI -->
      <mat-form-field>
        <mat-label>Categoria</mat-label>
        <mat-select [formControl]="pokemonControl">
          <mat-option>-- None --</mat-option>
          @for (group of pokemonGroups; track group) {
            <mat-optgroup [label]="group.name" [disabled]="group.disabled">
              @for (pokemon of group.pokemon; track pokemon) {
                <mat-option [value]="pokemon.value">{{ pokemon.viewValue }}</mat-option>
              }
            </mat-optgroup>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="filterContainer">
      <button [ngClass]="{ type: true, selected: true }">C</button>
      <button [ngClass]="{ type: true, selected: false }">D</button>
    </div>
  </form>
</div>
