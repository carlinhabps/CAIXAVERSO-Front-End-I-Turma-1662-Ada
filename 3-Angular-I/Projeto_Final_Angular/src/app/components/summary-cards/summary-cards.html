<div class="summary-container">
  @for (item of summaryCards; track item.id) {
    <div
      [ngClass]="{
        'summary-item': true,
        receita: item.id === tipoReceita,
        despesa: item.id === tipoDespesa,
      }"
    >
      <h2>{{ item.value | currency: 'BRL' }}</h2>
      <p>{{ item.type }}</p>
    </div>
  }
</div>
